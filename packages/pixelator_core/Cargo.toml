[package]
name = "pixelator-core"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5.48", features = ["derive"] }
sprs = "0.11.3"
rand = "0.9.2"
indicatif = { version = "0.18.0", features = ["rayon"] }
ndarray = "0.16.1"
rustc-hash = "2.1.1"
csv = "1.3.1"
env_logger = "0.11.8"
log = "0.4.28"
num-traits = "0.2.19"
is_close = "0.1.3"
rayon = "1.11.0"
smallvec = "1.15.1"
itertools = "0.14.0"
parquet = "57.2.0"
arrow = "57.2.0"
mimalloc = "0.1.48"

[features]
default = []
experimental = []

[dev-dependencies]
divan = "0.1.21"
tempfile = "3.24.0"

[[bench]]
name = "pixelator-core-benchmarks"
harness = false
path = "benches/main.rs"
