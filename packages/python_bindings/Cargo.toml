[package]
name = "pixelator_core_py"
version.workspace = true
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
paste = "1.0.15"
pixelator-core = { path = "../pixelator_core" }
pyo3 = { version = "0.26", features = ["extension-module"] }
pyo3-log = "0.13.3"
log = "0.4.28"
mimalloc = "0.1.48"
rustc-hash = "2.1.1"

[features]
default = []
