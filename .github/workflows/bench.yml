name: benchmark

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup caching
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: cargo bench 2>&1 | tee output.txt

      - name: Convert divan output to json
        run: |
          python3 ${{ github.workspace }}/.github/scripts/divan2json.py output.txt bench_results.json
          cat bench_results.json

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Native Community Detection Benchmark
          tool: customSmallerIsBetter
          output-file-path: ${{ github.workspace }}/bench_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: "gh-page"
          comment-always: true
          alert-threshold: "200%"
          comment-on-alert: true
