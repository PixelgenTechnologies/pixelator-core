name: check-version-bump

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-version-bump:
    name: Cargo workspace version bump (dev -> main)
    if: ${{ github.head_ref == 'dev' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compare Cargo.toml workspace.package.version with main base commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          get_workspace_version() {
            python -c "
          import sys
          import tomllib
          data = tomllib.loads(sys.stdin.read())
          print(data[\"workspace\"][\"package\"][\"version\"])"
          }

          base_version="$(git show "${BASE_SHA}:Cargo.toml" | get_workspace_version)"
          echo "base(main) version: ${base_version}"

          head_version="$(get_workspace_version < Cargo.toml)"
          echo "head(dev)  version: ${head_version}"

          if [ "${head_version}" = "${base_version}" ]; then
            echo "Error: workspace.package.version in Cargo.toml must be updated for dev -> main PRs."
            exit 1
          fi
