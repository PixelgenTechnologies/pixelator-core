name: wheels

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify-release-version:
    name: verify release tag matches package versions
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Check pyproject.toml and Cargo.toml match Git tag
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python << 'EOF'
          import os
          import tomllib
          from pathlib import Path

          ref_name = os.environ["GITHUB_REF_NAME"]
          tag_ver = ref_name.removeprefix("v") if ref_name.startswith("v") else ref_name

          root = Path("packages/python_bindings")
          with open(root / "pyproject.toml", "rb") as f:
              py_ver = tomllib.load(f)["project"]["version"]
          with open(root / "Cargo.toml", "rb") as f:
              cargo_ver = tomllib.load(f)["package"]["version"]

          errors = []
          if py_ver != tag_ver:
              errors.append(
                  f"pyproject.toml has version {py_ver!r}, expected {tag_ver!r} from tag {ref_name!r}"
              )
          if cargo_ver != tag_ver:
              errors.append(
                  f"Cargo.toml has version {cargo_ver!r}, expected {tag_ver!r} from tag {ref_name!r}"
              )
          if errors:
              print("\n".join(errors))
              raise SystemExit(1)
          print(f"OK: pyproject and Cargo.toml version {tag_ver!r} matches tag {ref_name!r}")
          EOF

  build:
    name: build on ${{ matrix.os }} (${{ matrix.target }})
    needs: verify-release-version
    if: ${{ !cancelled() && (needs.verify-release-version.result == 'success' || needs.verify-release-version.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        os: [linux, macos, windows]
        target: [undefined]
        manylinux: [auto]
        include:
          # linux
          - os: linux
            manylinux: manylinux_2_28
            target: aarch64
          - os: linux
            manylinux: manylinux_2_28
            target: x86_64

          # macos;
          - os: macos
            target: x86_64
          - os: macos
            target: aarch64

          # windows;
          - os: windows
            target: x86_64

        exclude:
          # was just a dummy variable to set a default value for target
          - target: undefined

    runs-on: ${{ matrix.runs-on || format('{0}-latest', (matrix.os == 'linux' && 'ubuntu') || matrix.os) }}
    env:
      PYTHON_INTERPRETERS: 3.10 3.11 3.12 3.13
    steps:
      - uses: actions/checkout@v5
      - name: set up python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.python-architecture || 'x64' }}

      - name: build wheels (linux)
        if: matrix.os == 'linux'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --interpreter ${{ env.PYTHON_INTERPRETERS }}
          rust-toolchain: stable
          docker-options: |
            -e CI
          working-directory: ./packages/python_bindings
          sccache: true
          before-script-linux: |
            if [ "${{ matrix.target }}" = "x86_64" ]; then
              yum update -y
              yum install -y git gcc-c++ cmake ninja-build openssl-devel
            fi
            if [ "${{ matrix.target }}" = "aarch64" ]; then
              apt-get update -y
              apt-get install -y git g++ cmake ninja-build libssl-dev
            fi

      - name: build wheels (macos/windows)
        if: matrix.os != 'linux'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --interpreter ${{ env.PYTHON_INTERPRETERS }}
          rust-toolchain: stable
          docker-options: -e CI
          working-directory: ./packages/python_bindings
          sccache: true

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: python-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: ./packages/python_bindings/dist/*.whl

  upload-release-assets:
    name: upload wheels to release
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Attach wheels to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.whl

  publish-pypi:
    name: publish wheels to PyPI
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./artifacts
